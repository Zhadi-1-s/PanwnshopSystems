<!-- Modern Sidebar with Tailwind CSS -->
<div class="relative">
  <!-- Toggle Button (Hamburger Menu) -->


  <button
    *ngIf="!sidebarOpen" 
    (click)="toggleSidebar()"
    class="flex fixed top-4 left-4 z-50 p-2 bg-white dark:bg-gray-900 hover:bg-gray-50 dark:hover:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-sm transition-all"
    [class.left-[272px]]="sidebarOpen"
  >

    <svg class="w-5 h-5 text-gray-700 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
     
    </svg>
  </button>


  <div
    *ngIf="sidebarOpen"
    (click)="toggleSidebar()"
    class="fixed inset-0 bg-black/50 z-30 lg:hidden backdrop-blur-sm transition-opacity"
  ></div>

 
  <aside 
    class="fixed top-0 left-0 z-40 flex flex-col h-screen w-64 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 transition-transform duration-300 ease-in-out"
    [class.-translate-x-full]="!sidebarOpen"
    [class.translate-x-0]="sidebarOpen"
  >
    
      <button
        (click)="toggleSidebar()"
        class="absolute top-4 right-4 p-2 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg shadow transition-all z-50"
        title="Toggle Sidebar"
      >
        <svg class="w-5 h-5 text-gray-700 dark:text-gray-300 transition-transform"
            [class.rotate-180]="sidebarOpen"
            fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 5l7 7-7 7"></path>
        </svg>
      </button>

    <div class="flex items-center gap-3 px-6 py-5 border-b border-gray-200 dark:border-gray-800 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors"
         routerLink="/dashboard">
      <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
        <span class="text-white font-bold text-lg">T</span>
      </div>
      <span class="text-lg font-semibold text-gray-900 dark:text-white">TechLombard</span>
    </div>

    <div class="px-4 py-6 border-b border-gray-200 dark:border-gray-800">

      <ng-container *ngIf="user; else loginBlock">
        <div class="flex items-center gap-3 sm:gap-4 p-2 sm:p-3 rounded-xl bg-gradient-to-r from-gray-50 to-white dark:from-gray-900/80 dark:to-gray-800/50 ring-1 ring-gray-200/80 dark:ring-gray-700/60 hover:ring-gray-300 dark:hover:ring-gray-600 hover:shadow-lg hover:shadow-gray-200/50 dark:hover:shadow-gray-900/50 transition-all duration-300 group">
          
          <!-- Avatar with initial letter -->
          <a
            [routerLink]="isPawnShop ? '/lombard-profile' : '/profile'"
            class="relative flex-shrink-0">
            
            <!-- Avatar circle -->
            <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center bg-gradient-to-br from-blue-500 to-indigo-600 text-white font-bold text-sm sm:text-base cursor-pointer ring-2 ring-white dark:ring-gray-800 shadow-md shadow-blue-500/30 group-hover:shadow-lg group-hover:shadow-blue-500/40 group-hover:scale-105 transition-all duration-300">
              {{ user.name.charAt(0) | uppercase }}
            </div>

            <!-- Online status indicator -->
            <span class="absolute bottom-0 right-0 w-3 h-3 sm:w-3.5 sm:h-3.5 bg-emerald-500 border-2 border-white dark:border-gray-800 rounded-full shadow-sm">
              <span class="absolute inset-0 rounded-full bg-emerald-400 animate-ping opacity-75"></span>
            </span>

            <!-- Unread notification badge -->
            <span *ngIf="(unreadCount$ | async) > 0"
                  class="absolute -top-1 -right-1 min-w-5 h-5 px-1.5 bg-red-500 rounded-full flex items-center justify-center shadow-md shadow-red-500/40">
              <span class="text-[10px] font-bold text-white">
                {{ (unreadCount$ | async) > 99 ? '99+' : (unreadCount$ | async) }}
              </span>
            </span>
          </a>

          <!-- User Info -->
          <div class="flex-1 min-w-0">
            <a 
              [routerLink]="isPawnShop ? '/lombard-profile' : '/profile'"
              class="block text-sm font-semibold text-gray-900 dark:text-white cursor-pointer hover:text-blue-600 dark:hover:text-blue-400 transition-colors truncate leading-tight">
              {{ user.name }}
            </a>
            <p class="text-xs text-gray-500 dark:text-gray-400 truncate mt-0.5 hidden sm:block">
              {{ user.email }}
            </p>
          </div>

          <!-- Action buttons -->
          <div class="flex items-center gap-1 sm:gap-2">
            <!-- Logout button -->
            <button
              (click)="logout()"
              class="p-2 sm:p-2.5 text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-all duration-200 group/logout"
              title="Logout">
              <svg class="w-4 h-4 sm:w-5 sm:h-5 group-hover/logout:translate-x-0.5 transition-transform duration-200" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
              </svg>
            </button>
          </div>

        </div>
      </ng-container>

      <!-- Login Block (when user is not logged in) -->
      <ng-template #loginBlock>
        <div class="flex items-center gap-2 sm:gap-3">
          <a
            routerLink="/login"
            class="inline-flex items-center gap-2 px-3 sm:px-4 py-2 sm:py-2.5 text-sm font-medium text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-800 ring-1 ring-gray-200 dark:ring-gray-700 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 hover:ring-gray-300 dark:hover:ring-gray-600 transition-all duration-200">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
            </svg>
            <span class="hidden sm:inline">{{ 'Login' | translate }}</span>
          </a>
          
         <a
              routerLink="/register"
              class="inline-flex items-center justify-center gap-2 px-3 sm:px-4 py-2 sm:py-2.5 text-sm font-medium text-white bg-gradient-to-r from-blue-600 to-indigo-600 rounded-lg shadow-md shadow-blue-500/25 hover:shadow-lg hover:shadow-blue-500/30 hover:from-blue-500 hover:to-indigo-500 transition-all duration-200 min-w-0 max-w-full"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M18 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0ZM3 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 9.374 21c-2.331 0-4.512-.645-6.374-1.766Z" />
            </svg>
            <span class="hidden sm:inline break-words text-center">{{ 'Register' | translate }}</span>
          </a>
        </div>
      </ng-template>


      <!-- If User Not Logged In -->
      <ng-template #loginBlock>
        <button 
          (click)="goToLogin()"
          class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors">
          <i class="fa-solid fa-right-to-bracket"></i>
          <span>{{ 'Login' | translate }}</span>
        </button>
      </ng-template>
    </div>

    <!-- Navigation Menu -->
    <nav class="flex-1 px-3 py-4 overflow-y-auto">
      <a *ngFor="let item of filteredItems"
         [routerLink]="item.route"
         routerLinkActive="bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 border-blue-600 dark:border-blue-400"
         class="flex items-center gap-3 px-3 py-2.5 mb-1 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-all border-l-3 border-transparent group relative">
        
        <i [class]="item.icon + ' text-base'"></i>
        <span class="text-sm font-medium flex-1">{{ item.label | translate }}</span>
        
        <!-- Badge -->
        <span *ngIf="item.badge"
              class="flex items-center justify-center min-w-[20px] h-5 px-1.5 text-xs font-semibold text-white bg-red-500 rounded-full">
          {{ item.badge }}
        </span>
      </a>
    </nav>

    <!-- Language Switcher -->
    <div class="px-4 py-4 border-t border-gray-200 dark:border-gray-800">
      <div class="relative" (clickOutside)="langOpen = false">
        <button
          (click)="langOpen = !langOpen"
          class="w-full flex items-center justify-between gap-3 px-4 py-2.5 bg-gray-50 dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-all group"
        >
          <div class="flex items-center gap-2">
            <svg class="w-5 h-5 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path>
            </svg>
            <span class="text-sm font-medium text-gray-700 dark:text-gray-300">
              {{ currentLang === 'en' ? 'English' : 'Русский' }}
            </span>
          </div>
          <svg 
            class="w-4 h-4 text-gray-400 transition-transform duration-200"
            [class.rotate-180]="langOpen"
            fill="none" 
            stroke="currentColor" 
            viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </button>

        <!-- Dropdown Menu -->
        <div
          *ngIf="langOpen"
          class="absolute bottom-full left-0 right-0 mb-2 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 overflow-hidden z-50 animate-fadeIn"
        >
          <button
            class="w-full flex items-center gap-3 px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-left"
            [ngClass]="{
                'bg-blue-50': currentLang === 'ru',
                'dark:bg-blue-900/20': currentLang === 'ru'
            }"

            (click)="changeLang('en'); langOpen = false"
          >
            <span class="text-xl">🇬🇧</span>
            <div class="flex-1">
              <div class="text-sm font-medium text-gray-900 dark:text-white">English</div>
              <div class="text-xs text-gray-500 dark:text-gray-400">English</div>
            </div>
            <svg 
              *ngIf="currentLang === 'en'" 
              class="w-5 h-5 text-blue-600 dark:text-blue-400" 
              fill="currentColor" 
              viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path>
            </svg>
          </button>

          <button
            class="w-full flex items-center gap-3 px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-left border-t border-gray-100 dark:border-gray-700"
            [ngClass]="{
              'bg-blue-50': currentLang === 'ru',
              'dark:bg-blue-900/20': currentLang === 'ru'
            }"
            (click)="changeLang('ru'); langOpen = false"
          >
            <span class="text-xl">🇷🇺</span>
            <div class="flex-1">
              <div class="text-sm font-medium text-gray-900 dark:text-white">Русский</div>
              <div class="text-xs text-gray-500 dark:text-gray-400">Russian</div>
            </div>
            <svg 
              *ngIf="currentLang === 'ru'" 
              class="w-5 h-5 text-blue-600 dark:text-blue-400" 
              fill="currentColor" 
              viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Footer Section (Optional) -->
    <div class="px-4 py-3 border-t border-gray-200 dark:border-gray-800">
      <div class="text-xs text-gray-500 dark:text-gray-400 text-center">
        © 2025 TechLombard
      </div>
    </div>
  </aside>
</div>
